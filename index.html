<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CraftMander</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CraftMander</h1>

<!-- Status banner -->
<div id="statusIndicator">⏳ Loading data...</div>

<!-- API key input -->
<div id="apiKeySection">
    <input type="text" id="apiKeyInput" placeholder="Enter GW2 API Key" style="width: 300px;">
    <button id="loadMaterialsBtn">Load Materials</button>
</div>

<!-- Recipe search -->
<div id="searchSection">
    <input type="text" id="recipeSearch" placeholder="Search recipes by name...">
    <ul id="searchResults"></ul>
</div>

<!-- User watchlist -->
<h2>Tracked Recipes</h2>
<ul id="watchlist"></ul>

<!-- Craftable recipe list -->
<h2>Craftable Recipes</h2>
<ul id="craftList"></ul>

<!-- Main script -->
<script src="app.js"></script>
</body>
</html>
